name: Generate Daily Podcast
on:
  schedule:
    - cron: '0 21 * * *' # Runs at 6:00 AM KST (21:00 UTC)
  workflow_dispatch: # Allows manual runs for testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install feedparser groq edge-tts boto3 python-dotenv
      - name: Run LEADER Engine
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          R2_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          R2_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
          R2_BUCKET_NAME: ${{ secrets.R2_BUCKET_NAME }}
          R2_PUBLIC_URL_BASE: ${{ secrets.R2_PUBLIC_URL_BASE }}
        run: python leader_engine.py

      - name: Push episodes.json to korean-portfolio
        env:
          PAT_TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
          git clone https://oauth2:$PAT_TOKEN@github.com/markyang0613/korean-portfolio.git
          cp episodes.json korean-portfolio/public/episodes.json
          cd korean-portfolio
          git config user.email "github-actions@github.com"
          git config user.name "GitHub Actions"
          git add public/episodes.json
          git diff --cached --quiet || git commit -m "chore: daily podcast update $(date +%Y-%m-%d)"
          git push